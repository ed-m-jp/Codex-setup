# =============================================================================
# Model
# =============================================================================

model = "gpt-5.3-codex"
model_reasoning_effort = "high"
model_auto_compact_token_limit = 200000

# =============================================================================
# Sandbox & Permissions
# =============================================================================

sandbox_mode = "workspace-write"
approval_policy = "on-request"

[sandbox_workspace_write]
network_access = true

# =============================================================================
# Features
# =============================================================================

suppress_unstable_features_warning = true

[features]
rmcp_client = true
fast_mode = false

# =============================================================================
# Shell Environment Policy
# =============================================================================

[shell_environment_policy]
exclude = [
  # Secrets & credentials
  "*PASSWORD*",
  "*PASS*",
  "*SECRET*",
  "*TOKEN*",
  "*API_KEY*",
  "*ACCESS_KEY*",
  "*PRIVATE_KEY*",
  "*SIGNING_KEY*",
  "*ENCRYPT*",
  "*CIPHER*",
  "*DSN*",
  "*SALT*",
  "*HASH*",
  # Cloud providers
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  # Third-party services
  "OPENAI_*",
  "STRIPE_*",
  "SENTRY_*",
  "SENDGRID_*",
  "TWILIO_*",
  "PAYPAL_*",
]

# =============================================================================
# Trusted Projects
# =============================================================================

[projects."/home/edward_maire/workProjects/zaikoio"]
trust_level = "trusted"

[projects."/home/edward_maire/projects/zaikoio"]
trust_level = "trusted"

[projects."/mnt/c/Users/edward.maire/PhpstormProjects/zaikoio"]
trust_level = "trusted"

[projects."/mnt/c/Users/edward.maire/PhpstormProjects/access-queue"]
trust_level = "trusted"

[projects."/mnt/c/Users/edward.maire/PhpstormProjects/zaikolive"]
trust_level = "trusted"

[projects."/mnt/c/Users/edward.maire/perso/Code-Scope"]
trust_level = "trusted"

[projects.'\\?\C:\Users\edward.maire\PhpstormProjects\zaikoio']
trust_level = "trusted"

[projects."C:\\Users\\edward.maire"]
trust_level = "trusted"

[projects."/mnt/c/Users/edward.maire"]
trust_level = "untrusted"

# =============================================================================
# MCP Servers
# =============================================================================

[mcp_servers.laravel-boost]
command = "php"
args = ["artisan", "boost:mcp"]
startup_timeout_sec = 120.0
tool_timeout_sec = 120.0

[mcp_servers.chrome-devtools]
command = "/mnt/c/Windows/System32/cmd.exe"
args = ["/c", "npx.cmd", "-y", "chrome-devtools-mcp@latest", '--executablePath=C:\Program Files\Google\Chrome\Application\chrome.exe', "--isolated"]
startup_timeout_sec = 30.0
tool_timeout_sec = 300.0

[mcp_servers.figma]
url = "https://mcp.figma.com/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"

[mcp_servers.sentry]
url = "https://mcp.sentry.dev/mcp"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

# =============================================================================
# Notices
# =============================================================================

[notice]
hide_rate_limit_model_nudge = true
